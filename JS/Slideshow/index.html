<!DOCTYPE html>
<html lang="cz" dir="ltr">
  <head>
    
    <meta charset="utf-8">
    <title></title>
    <link rel="stylesheet" href="style.css">

    <script
  src="https://code.jquery.com/jquery-3.6.0.min.js"
  integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4="
  crossorigin="anonymous"></script>
  </head>
  <body>
    <section class="nahoru1"></section>
<div class="prescelou">
    <div class="menu">
        <h1>Můj web</h1>
            <div class="topnav" id="myTopnav">
                <a class="aktualni nahoru" href="#">Nahoru</a>
                <a class="aktualni domu" href="#">Domů</a>
                <a class="aktualni kontakt" href="#">Kontakt</a>
                <a class="aktualni ome" href="#">O mě</a>
                <a href="javascript:void(0);" class="icon" onclick="topnavFunction()">
                    <i class="fa fa-bars"></i>
                </a>
            </div>
    </div>
</div>
<div class="asdf"></div>
    <!--image slider start-->
    <div class="slider">
      <div class="slides">
        <!--radio buttons start-->
        <input type="radio" name="radio-btn" id="radio1">
        <input type="radio" name="radio-btn" id="radio2">
        <input type="radio" name="radio-btn" id="radio3">
        <input type="radio" name="radio-btn" id="radio4">
        <input type="radio" name="radio-btn" id="radio5">
        <!--radio buttons end-->
        <!--slide images start-->
        <div class="slide first">
          <img src="img/1.jpg" alt="">
        </div>
        <div class="slide">
          <img src="img/2.jpg" alt="">
        </div>
        <div class="slide">
          <img src="img/3.jpg" alt="">
        </div>
        <div class="slide">
          <img src="img/4.jpg" alt="">
        </div>
        <div class="slide">
          <img src="img/5.jpg" alt="">
        </div>
        <!--slide images end-->
        <!--automatic navigation start-->
        <div class="navigation-auto">
          <div class="auto-btn1"></div>
          <div class="auto-btn2"></div>
          <div class="auto-btn3"></div>
          <div class="auto-btn4"></div>
          <div class="auto-btn5"></div>
        </div>
        <!--automatic navigation end-->
      </div>
      <!--manual navigation start-->
      <div class="navigation-manual">
        <label for="radio1" class="manual-btn"></label>
        <label for="radio2" class="manual-btn"></label>
        <label for="radio3" class="manual-btn"></label>
        <label for="radio4" class="manual-btn"></label>
        <label for="radio5" class="manual-btn"></label>
      </div>
      <!--manual navigation end-->
    </div>
    <!--image slider end-->

    <script type="text/javascript">
    var counter = 1;
    setInterval(function(){
      document.getElementById('radio' + counter).checked = true;
      counter++;
      if(counter > 5){
        counter = 1;
      }
    }, 4000);
    </script>
  <!--Začátek boxu na text-->
  <div class="box0">
    <section class="domu1">
    <h3><br><br><br>Domů</h3>
    <section class="kontakt1">
    <h3><br><br><br>Kontakt</h3>
    <section class="ome1">
    <h3><br><br><br>O mě</h3>
  </div>

  </body>
  <script>
 (function($){  
   $(function(){
       /* Scroll to sections */
       $(".domu").click(function(){
          $("html, body").animate({scrollTop: $(".domu1").offset().top}, 1000);
       });    
   }); 
   $(function(){
       /* Scroll to sections */
       $(".kontakt").click(function(){
          $("html, body").animate({scrollTop: $(".kontakt1").offset().top}, 1000);
       });    
   }); 
   $(function(){
       /* Scroll to sections */
       $(".ome").click(function(){
          $("html, body").animate({scrollTop: $(".ome1").offset().top}, 1000);
       });   
      });
      $(function(){
       /* Scroll to sections */
       $(".nahoru").click(function(){
          $("html, body").animate({scrollTop: $(".nahoru1").offset().top}, 1000);
       });   
      }); 
})(jQuery);

  </script>
</html>
